name: CI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit + E2E
    runs-on: ubuntu-latest

    env:
      # These secrets must be added in GitHub → Settings → Secrets → Actions.
      # The Vite dev server (started by Playwright webServer config) picks them
      # up automatically as VITE_* env vars.
      VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ── Unit tests (no server needed) ───────────────────────────────────────
      - name: Run Vitest unit tests
        run: npm run test:unit -- --reporter=verbose

      # ── E2E tests (Playwright starts the dev server via webServer config) ───
      - name: Run Playwright E2E tests
        run: npm run test:e2e
        env:
          CI: true   # tells playwright.config.js NOT to reuse an existing server

      # ── Upload Playwright HTML report on failure ────────────────────────────
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
